<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- D20 - icosahedron edges only (wireframe), light stroke for dark theme -->
  <g transform="translate(32,32) scale(1.15, 1.4)" fill="none" stroke="#000" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bottom/back triangle -->
    <path d="M0 18 L-16 -8 L16 -8 Z"/>
    <path d="M-16 -8 L-22 4 L0 18 Z"/>
    <path d="M16 -8 L0 18 L22 4 Z"/>
    <!-- Side triangles -->
    <path d="M0 -18 L-16 8 L16 8 Z"/>
    <path d="M-16 8 L0 -18 L-22 -4 Z"/>
    <path d="M16 8 L22 -4 L0 -18 Z"/>
    <!-- Central band (connects the two "hemispheres") -->
    <path d="M-16 8 L0 18 L16 8 Z"/>
  </g>
</svg>
